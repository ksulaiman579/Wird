# jdk.net.unixdomain.tmpdir: the AF_UNIX socket used by NIO's Selector self-pipe
# must live outside %LOCALAPPDATA%\Temp, whose filter driver breaks AF_UNIX
# connect() on this machine (bind works, connect -> "Invalid argument").
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djdk.net.unixdomain.tmpdir=C:\\gradle-tmp
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
