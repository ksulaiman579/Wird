AutoName: Wird
Summary: Memorize the Quran, 40 Hadith & duas offline, with spaced repetition.
Description: |-
    Wird helps you memorize the Quran, the 40 Hadith of an-Nawawi, and
    daily duas from Hisnul Muslim — at your own pace, fully offline, with
    no account and no server.

    Sessions follow the classic hifz structure (Sabaq/Sabqi/Manzil) with a
    spaced-repetition scheduler adapting review timing to how well you
    know each portion. Choose your own memorization plan (whole Quran,
    specific surahs, or juz, in normal or traditional reversed order),
    track streaks and achievements, and get local prayer-time reminders —
    calculated fully offline, no location permission required.

    No account, no analytics, no ads. Fully open source (GPL-3.0).

